<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tarjeta de monitor · Grandvalira</title>
  <style>
    :root {
      --azul: #3b8fd6;
      --azul-osc: #2a6aa5;
      --texto: #e8eef6;
      --suave: #9fb1c4;
      --estrella: #ffc107;
      --surface: #15233a;
      --surface-2: #1d3047;
      --borde: #2c425e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--texto);
      background: linear-gradient(160deg, #0a1626 0%, #0f2540 55%, #143a5e 100%);
      background-attachment: fixed;
      min-height: 100vh;
      padding: 20px calc(14px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
      display: flex;
      justify-content: center;
    }
    .wrap { width: 100%; max-width: 480px; }

    @media (max-width: 380px) {
      body { padding-left: calc(10px + env(safe-area-inset-left)); padding-right: calc(10px + env(safe-area-inset-right)); padding-top: 14px; }
      .nombre { font-size: 1.35rem; }
      .estrellas label { font-size: 1.7rem; }
    }

    /* Tarjeta de presentación */
    .card {
      position: relative;
      background: var(--surface);
      border-radius: 22px;
      box-shadow: 0 12px 32px rgba(0,0,0,.45);
      text-align: center;
      overflow: hidden;
    }
    /* Imagen real de montañas: cubre foto, nombre y título */
    .banner {
      background: #cdd9e6 url("assets/montanas.jpg?v=2") center/cover no-repeat;
      padding: 150px 20px 18px;
      text-align: center;
    }
    .card-body { padding: 18px 20px 22px; }
    .foto {
      width: 150px; height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 6px 18px rgba(10,30,60,.35);
      margin: 0 auto 12px;
      display: block;
      background: #cdd9e6;
    }
    .nombre { font-size: 1.5rem; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 2px 10px rgba(0,0,0,.7); }
    .titulo { color: #eaf2fb; font-weight: 600; margin-top: 2px; text-shadow: 0 1px 3px rgba(0,0,0,.9), 0 2px 10px rgba(0,0,0,.7); }
    .rating {
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 10px; padding: 5px 12px;
      background: rgba(0,0,0,.45); border-radius: 999px;
      backdrop-filter: blur(4px);
    }
    .rating-stars { color: #ffc107; font-size: 1rem; letter-spacing: 1px; }
    .rating-num { color: #fff; font-weight: 700; }
    .rating-count { color: #d6e0ec; font-size: .82rem; }
    .datos {
      margin-top: 16px;
      text-align: left;
      display: grid;
      gap: 8px;
      font-size: .95rem;
    }
    .datos div { display: flex; align-items: center; gap: 10px; color: var(--suave); }
    .datos .ico { width: 20px; text-align: center; }
    .datos a { color: var(--azul); text-decoration: none; }

    /* Sección "Sobre mí" */
    .sobre {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--borde);
      text-align: left;
    }
    .sobre h3 { font-size: 1rem; color: var(--azul); margin-bottom: 6px; }
    .sobre p { color: var(--texto); font-size: .92rem; line-height: 1.5; white-space: pre-line; }
    .tips-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .tips-label { font-size: .8rem; color: var(--texto-dim, #8899aa); }
    .btn-wise, .btn-bizum {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      font-size: .8rem; cursor: pointer; transition: background .2s;
    }
    .btn-wise {
      background: rgba(22, 185, 140, 0.12); color: #16b98c;
      border: 1px solid rgba(22, 185, 140, 0.35); text-decoration: none;
    }
    .btn-wise:hover { background: rgba(22, 185, 140, 0.22); }
    .btn-bizum {
      background: rgba(0, 130, 255, 0.12); color: #3399ff;
      border: 1px solid rgba(0, 130, 255, 0.35); font-family: inherit;
      width: auto;
    }
    .btn-bizum:hover { background: rgba(0, 130, 255, 0.22); }

    /* Datos + logos en fila: texto a la izquierda, redes en columna a la derecha */
    .info { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
    .info .datos { flex: 1; margin-top: 0; }
    /* Logos sociales, en columna a la derecha de los datos */
    .social {
      display: flex; flex-direction: column; gap: 10px;
    }
    .social a {
      width: 30px; height: 30px; display: inline-flex;
      align-items: center; justify-content: center;
      border-radius: 8px; color: #fff;
      transition: transform .12s ease, opacity .12s ease;
    }
    .social a:hover { transform: translateY(-2px); opacity: .9; }
    .social a svg { width: 17px; height: 17px; fill: currentColor; }
    .social .wa { background: #25d366; }
    .social .tk { background: #000; }
    .social .ig { background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5); }
    .social a[hidden] { display: none; }

    /* Formulario */
    .form-card {
      background: var(--surface);
      border-radius: 22px;
      padding: 22px 20px 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,.45);
      margin-top: 18px;
    }
    .form-card h2 { font-size: 1.2rem; margin-bottom: 4px; }
    .form-card .sub { color: var(--suave); font-size: .9rem; margin-bottom: 18px; }
    .pregunta { margin-bottom: 20px; }
    .pregunta > label.q { display: block; font-weight: 600; margin-bottom: 8px; }

    .pregunta .qsub { display: block; color: var(--suave); font-size: .95rem; font-weight: 400; margin: -4px 0 10px; }

    /* Estrellas: radios en orden inverso con flex-direction reverse */
    .estrellas { display: inline-flex; flex-direction: row-reverse; gap: 4px; }
    .estrellas input { position: absolute; opacity: 0; width: 0; height: 0; }
    .estrellas label {
      font-size: 2rem; line-height: 1; cursor: pointer; color: #3a4d66;
      transition: color .12s ease; padding: 2px;
    }
    .estrellas label::before { content: "★"; }
    .estrellas input:checked ~ label,
    .estrellas label:hover,
    .estrellas label:hover ~ label { color: #ffc107; }
    .estrellas input:focus-visible + label { outline: 2px solid var(--azul); border-radius: 4px; }

    textarea {
      width: 100%; border: 2px solid var(--borde); border-radius: 12px;
      padding: 12px; font: inherit; resize: vertical; min-height: 80px;
      background: var(--surface-2); color: var(--texto);
    }
    textarea::placeholder { color: var(--suave); }
    textarea:focus { outline: none; border-color: var(--azul); }

    button {
      width: 100%; padding: 15px; border: none; border-radius: 14px;
      background: var(--azul); color: #fff; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; margin-top: 6px; transition: background .15s ease;
    }
    button:hover:not(:disabled) { background: var(--azul-osc); }
    button:disabled { opacity: .6; cursor: default; }

    .msg { margin-top: 14px; padding: 14px; border-radius: 12px; text-align: center; font-weight: 600; display: none; }
    .msg.ok { display: block; background: rgba(31,122,69,.2); color: #6ee7a0; }
    .msg.err { display: block; background: rgba(179,38,30,.2); color: #ff8a80; }

    .gracias { text-align: center; padding: 20px 0; }
    .gracias .check { font-size: 3rem; }
    .gracias h2 { margin: 8px 0 4px; }
    .gracias p { color: var(--suave); }
  </style>
</head>

      <form id="form">

  <script>
    const WEBHOOK_URL = "https://n8n.guillers.es/webhook/grandvalira";
    const STATS_URL = "https://n8n.guillers.es/webhook/grandvalira-stats";

    // Preguntas con escala: la 1ª opción puntúa 5 y la última 1
    const PREGUNTAS = [
      { campo: "dinamismo", titulo: "1. Dinamismo y organización", sub: "¿La clase fue dinámica y bien estructurada?", opciones: ["Sí, totalmente", "En gran parte", "A veces", "Poco", "Nada"] },
      { campo: "correccionTecnica", titulo: "2. Corrección técnica", sub: "¿El instructor corrigió adecuadamente tu técnica y posturas durante la sesión?", opciones: ["Constantemente y de forma útil", "Frecuentemente", "Ocasionalmente", "Muy poco", "Nada"] },
      { campo: "progresion", titulo: "3. Progresión y aprendizaje", sub: "¿Sientes que has mejorado tu nivel de esquí alpino después de la clase?", opciones: ["Mucho", "Bastante", "Algo", "Poco", "Nada"] },
      { campo: "trato", titulo: "4. Atención y trato", sub: "¿Cómo valorarías el trato, la comunicación y la amabilidad del instructor/a?", opciones: ["Excelente", "Muy buena", "Buena", "Mejorable", "Insuficiente"] },
      { campo: "adaptacion", titulo: "5. Adaptación al nivel", sub: "¿La clase se adaptó correctamente a tu nivel y objetivos?", opciones: ["Perfectamente", "Bien adaptada", "Parcialmente", "Poco adaptada", "Nada adaptada"] },
      { campo: "seguridad", titulo: "6. Seguridad y confianza", sub: "¿Te sentiste seguro/a y acompañado/a durante la actividad?", opciones: ["Siempre", "Casi siempre", "A veces", "Rara vez", "Nunca"] }
    ];
    const CAMPOS_ESCALA = PREGUNTAS.map(p => p.campo);

    const params = new URLSearchParams(location.search);
    const monitorId = params.get("id") || "demo";
    let monitor = null;

    // Renderiza las preguntas con estrellas (1 a 5)
    (function generarPreguntas() {
      const cont = document.getElementById("preguntas");
      PREGUNTAS.forEach(p => {
        const wrap = document.createElement("div");
        wrap.className = "pregunta";
        const lab = document.createElement("label");
        lab.className = "q"; lab.textContent = p.titulo;
        const sub = document.createElement("span");
        sub.className = "qsub"; sub.textContent = p.sub;
        const est = document.createElement("div");
        est.className = "estrellas";
        for (let i = 5; i >= 1; i--) { // 5..1 para que el CSS row-reverse funcione
          const id = `${p.campo}-${i}`;
          const input = document.createElement("input");
          input.type = "radio"; input.name = p.campo; input.value = i; input.id = id;
          const label = document.createElement("label");
          label.htmlFor = id; label.setAttribute("aria-label", `${i} estrellas`);
          est.appendChild(input); est.appendChild(label);
        }
        wrap.append(lab, sub, est);
        cont.appendChild(wrap);
      });
    })();

    // Carga los datos del monitor
    async function cargarMonitor() {
      try {
        const res = await fetch("monitores.json", { cache: "no-store" });
        const data = await res.json();
        monitor = data[monitorId];
        if (!monitor) { mostrarAviso(); return; }
        pintarTarjeta(monitor);
        document.getElementById("tarjeta").hidden = false;
        document.getElementById("formCard").hidden = false;
        cargarValoracion();
      } catch (e) {
        mostrarAviso();
      }
    }

    // Lee la media general del monitor y la muestra en la tarjeta
    async function cargarValoracion() {
      try {
        const res = await fetch(`${STATS_URL}?id=${encodeURIComponent(monitorId)}`, { cache: "no-store" });
        if (!res.ok) return;
        let data = await res.json();
        if (Array.isArray(data)) data = data[0];
        if (!data || data.media_general == null) return;
        pintarRating(Number(data.media_general), Number(data.total_valoraciones) || 0);
      } catch (e) { /* silencioso: si falla, no se muestra rating */ }
    }

    function pintarRating(media, total) {
      const llenas = Math.round(media);
      document.getElementById("ratingStars").textContent =
        "★".repeat(llenas) + "☆".repeat(5 - llenas);
      document.getElementById("ratingNum").textContent = media.toFixed(1);
      document.getElementById("ratingCount").textContent =
        `(${total} ${total === 1 ? "valoración" : "valoraciones"})`;
      document.getElementById("rating").hidden = false;
    }

    function pintarTarjeta(m) {
      const foto = document.getElementById("foto");
      foto.src = m.foto; foto.alt = "Foto de " + m.nombre;
      document.getElementById("nombre").textContent = m.nombre;
      document.getElementById("titulo").textContent = m.titulo;
      const tel = document.getElementById("telefono");
      tel.textContent = m.telefono; tel.href = "tel:" + m.telefono.replace(/\s/g, "");
      const mail = document.getElementById("email");
      mail.textContent = m.email; mail.href = "mailto:" + m.email;
      document.getElementById("idiomas").textContent = m.idiomas;
      document.getElementById("experiencia").textContent = m.experiencia;

      // Sección "Sobre mí": solo si el monitor tiene texto
      const sobre = document.getElementById("sobre");
      if (m.sobre) {
        document.getElementById("sobreTexto").textContent = m.sobre;
        sobre.hidden = false;
        const wiseBtn = document.getElementById("wiseBtn");
        const bizumBtn = document.getElementById("bizumBtn");
        const tipsRow = document.getElementById("tipsRow");
        if (m.wise) { wiseBtn.href = m.wise; wiseBtn.hidden = false; } else { wiseBtn.hidden = true; }
        if (m.telefono) {
          bizumBtn.hidden = false;
          bizumBtn.onclick = () => {
            const num = m.telefono.replace(/\s/g, "");
            navigator.clipboard.writeText(num).then(() => {

    function mostrarAviso() {
      const t = document.getElementById("tarjeta");
      t.hidden = false;
      t.innerHTML = '<div class="nombre">Monitor no encontrado</div>' +
        '<p class="titulo">No existe un monitor con id "' + monitorId + '".</p>';
    }

    // Envío del formulario
    const form = document.getElementById("form");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.className = "msg";

      const valores = {};
      for (let i = 0; i < CAMPOS_ESCALA.length; i++) {
        const campo = CAMPOS_ESCALA[i];
        const sel = form.querySelector(`input[name="${campo}"]:checked`);
        if (!sel) {
          error(`Por favor, responde la pregunta ${i + 1}.`);
          const grupo = form.querySelector(`input[name="${campo}"]`);
          if (grupo) grupo.closest(".pregunta").scrollIntoView({ behavior: "smooth", block: "center" });
          return;
        }
        valores[campo] = Number(sel.value);
      }

      const payload = {
        monitorId: monitorId,
        monitorNombre: monitor ? monitor.nombre : null,
        ...valores,
        loMejor: document.getElementById("loMejor").value.trim(),
        mejorar: document.getElementById("mejorar").value.trim()
      };

      const btn = document.getElementById("btnEnviar");
      btn.disabled = true; btn.textContent = "Enviando...";
      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        try {
          let r = await res.json();
          if (Array.isArray(r)) r = r[0];
          if (r && r.media_general != null) pintarRating(Number(r.media_general), Number(r.total_valoraciones) || 0);
        } catch (e) { /* ignora */ }
        document.getElementById("formCard").hidden = true;
        document.getElementById("gracias").hidden = false;
        document.getElementById("gracias").scrollIntoView({ behavior: "smooth" });
      } catch (err) {
        error("No se pudo enviar. Revisa tu conexión e inténtalo de nuevo.");
        btn.disabled = false; btn.textContent = "Enviar valoración";
      }

      function error(texto) { msg.textContent = texto; msg.className = "msg err"; }
    });

    cargarMonitor();
  </script>
