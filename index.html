<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Tarjeta de monitor · Grandvalira</title>
  <style>
    :root {
      --azul: #3b8fd6;
      --azul-osc: #2a6aa5;
      --texto: #e8eef6;
      --suave: #9fb1c4;
      --estrella: #ffc107;
      --surface: #15233a;
      --surface-2: #1d3047;
      --borde: #2c425e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--texto);
      background: linear-gradient(160deg, #0a1626 0%, #0f2540 55%, #143a5e 100%);
      background-attachment: fixed;
      min-height: 100vh;
      padding: 24px 16px calc(24px + env(safe-area-inset-bottom));
      display: flex;
      justify-content: center;
    }
    .wrap { width: 100%; max-width: 440px; }

    /* Tarjeta de presentación */
    .card {
      position: relative;
      background: var(--surface);
      border-radius: 22px;
      box-shadow: 0 12px 32px rgba(0,0,0,.45);
      text-align: center;
      overflow: hidden;
    }
    /* Imagen real de montañas: cubre foto, nombre y título */
    .banner {
      background: #cdd9e6 url("assets/montanas.jpg") center/cover no-repeat;
      padding: 150px 20px 18px;
      text-align: center;
    }
    .card-body { padding: 18px 20px 22px; }
    .foto {
      width: 120px; height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 6px 18px rgba(10,30,60,.35);
      margin: 0 auto 12px;
      display: block;
      background: #cdd9e6;
    }
    .nombre { font-size: 1.5rem; font-weight: 700; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
    .titulo { color: #eaf2fb; font-weight: 600; margin-top: 2px; text-shadow: 0 1px 4px rgba(0,0,0,.5); }
    .datos {
      margin-top: 16px;
      text-align: left;
      display: grid;
      gap: 8px;
      font-size: .95rem;
    }
    .datos div { display: flex; align-items: center; gap: 10px; color: var(--suave); }
    .datos .ico { width: 20px; text-align: center; }
    .datos a { color: var(--azul); text-decoration: none; }

    /* Datos + logos en fila: texto a la izquierda, redes en columna a la derecha */
    .info { display: flex; align-items: center; gap: 14px; margin-top: 16px; }
    .info .datos { flex: 1; margin-top: 0; }
    /* Logos sociales, en columna a la derecha de los datos */
    .social {
      display: flex; flex-direction: column; gap: 10px;
    }
    .social a {
      width: 30px; height: 30px; display: inline-flex;
      align-items: center; justify-content: center;
      border-radius: 8px; color: #fff;
      transition: transform .12s ease, opacity .12s ease;
    }
    .social a:hover { transform: translateY(-2px); opacity: .9; }
    .social a svg { width: 17px; height: 17px; fill: currentColor; }
    .social .wa { background: #25d366; }
    .social .tk { background: #000; }
    .social .ig { background: linear-gradient(45deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5); }
    .social a[hidden] { display: none; }

    /* Formulario */
    .form-card {
      background: var(--surface);
      border-radius: 22px;
      padding: 22px 20px 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,.45);
      margin-top: 18px;
    }
    .form-card h2 { font-size: 1.2rem; margin-bottom: 4px; }
    .form-card .sub { color: var(--suave); font-size: .9rem; margin-bottom: 18px; }
    .pregunta { margin-bottom: 20px; }
    .pregunta > label.q { display: block; font-weight: 600; margin-bottom: 8px; }

    /* Estrellas: radios en orden inverso con flex-direction reverse */
    .estrellas { display: inline-flex; flex-direction: row-reverse; gap: 4px; }
    .estrellas input { position: absolute; opacity: 0; width: 0; height: 0; }
    .estrellas label {
      font-size: 2rem; line-height: 1; cursor: pointer; color: #3a4d66;
      transition: color .12s ease; padding: 2px;
    }
    .estrellas label::before { content: "★"; }
    .estrellas input:checked ~ label,
    .estrellas label:hover,
    .estrellas label:hover ~ label { color: #ffc107; }
    .estrellas input:focus-visible + label { outline: 2px solid var(--azul); border-radius: 4px; }

    /* Sí / No */
    .opciones { display: flex; gap: 12px; }
    .opciones label {
      flex: 1; text-align: center; padding: 12px; border-radius: 12px;
      border: 2px solid var(--borde); cursor: pointer; font-weight: 600; color: var(--suave);
      transition: all .12s ease;
    }
    .opciones input { position: absolute; opacity: 0; }
    .opciones input:checked + label { border-color: var(--azul); background: var(--azul); color: #fff; }

    textarea {
      width: 100%; border: 2px solid var(--borde); border-radius: 12px;
      padding: 12px; font: inherit; resize: vertical; min-height: 80px;
      background: var(--surface-2); color: var(--texto);
    }
    textarea::placeholder { color: var(--suave); }
    textarea:focus { outline: none; border-color: var(--azul); }

    button {
      width: 100%; padding: 15px; border: none; border-radius: 14px;
      background: var(--azul); color: #fff; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; margin-top: 6px; transition: background .15s ease;
    }
    button:hover:not(:disabled) { background: var(--azul-osc); }
    button:disabled { opacity: .6; cursor: default; }

    .msg { margin-top: 14px; padding: 14px; border-radius: 12px; text-align: center; font-weight: 600; display: none; }
    .msg.ok { display: block; background: rgba(31,122,69,.2); color: #6ee7a0; }
    .msg.err { display: block; background: rgba(179,38,30,.2); color: #ff8a80; }

    .gracias { text-align: center; padding: 20px 0; }
    .gracias .check { font-size: 3rem; }
    .gracias h2 { margin: 8px 0 4px; }
    .gracias p { color: var(--suave); }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- Tarjeta de presentación -->
    <section class="card" id="tarjeta" hidden>
      <div class="banner">
        <img class="foto" id="foto" alt="Foto del monitor">
        <div class="nombre" id="nombre"></div>
        <div class="titulo" id="titulo"></div>
      </div>
      <div class="card-body">
        <div class="info">
          <div class="datos">
            <div><span class="ico">📞</span><a id="telefono"></a></div>
            <div><span class="ico">✉️</span><a id="email"></a></div>
            <div><span class="ico">🗣️</span><span id="idiomas"></span></div>
            <div><span class="ico">⛷️</span><span id="experiencia"></span></div>
          </div>
          <div class="social">
            <a class="wa" id="soc-whatsapp" target="_blank" rel="noopener" aria-label="WhatsApp" hidden>
              <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163a11.867 11.867 0 0 1-1.587-5.946C.16 5.335 5.495 0 12.05 0a11.82 11.82 0 0 1 8.413 3.488 11.824 11.824 0 0 1 3.48 8.414c-.003 6.557-5.338 11.892-11.893 11.892a11.9 11.9 0 0 1-5.688-1.448L.057 24zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884a9.86 9.86 0 0 0 1.512 5.26l-.999 3.648 3.736-.979zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
            </a>
            <a class="tk" id="soc-tiktok" target="_blank" rel="noopener" aria-label="TikTok" hidden>
              <svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
            </a>
            <a class="ig" id="soc-instagram" target="_blank" rel="noopener" aria-label="Instagram" hidden>
              <svg viewBox="0 0 24 24"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.8.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.43.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.8-.41 2.23-.22.56-.48.96-.9 1.38-.42.42-.82.68-1.38.9-.43.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.8-.25-2.23-.41a3.7 3.7 0 0 1-1.38-.9 3.7 3.7 0 0 1-.9-1.38c-.16-.43-.36-1.06-.41-2.23C2.17 15.58 2.16 15.2 2.16 12s.01-3.58.07-4.85c.05-1.17.25-1.8.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.43-.16 1.06-.36 2.23-.41C8.42 2.17 8.8 2.16 12 2.16zm0 1.62c-3.15 0-3.52.01-4.76.07-.99.05-1.53.21-1.89.35-.47.18-.81.4-1.17.76-.36.36-.58.7-.76 1.17-.14.36-.3.9-.35 1.89-.06 1.24-.07 1.61-.07 4.76s.01 3.52.07 4.76c.05.99.21 1.53.35 1.89.18.47.4.81.76 1.17.36.36.7.58 1.17.76.36.14.9.3 1.89.35 1.24.06 1.61.07 4.76.07s3.52-.01 4.76-.07c.99-.05 1.53-.21 1.89-.35.47-.18.81-.4 1.17-.76.36-.36.58-.7.76-1.17.14-.36.3-.9.35-1.89.06-1.24.07-1.61.07-4.76s-.01-3.52-.07-4.76c-.05-.99-.21-1.53-.35-1.89a3.15 3.15 0 0 0-.76-1.17 3.15 3.15 0 0 0-1.17-.76c-.36-.14-.9-.3-1.89-.35-1.24-.06-1.61-.07-4.76-.07zm0 2.76a5.46 5.46 0 1 1 0 10.92 5.46 5.46 0 0 1 0-10.92zm0 9a3.54 3.54 0 1 0 0-7.08 3.54 3.54 0 0 0 0 7.08zm6.95-9.22a1.27 1.27 0 1 1-2.55 0 1.27 1.27 0 0 1 2.55 0z"/></svg>
            </a>
          </div>
        </div>
      </div>
    </section>

    <!-- Formulario de valoración -->
    <section class="form-card" id="formCard" hidden>
      <h2>Valora tu clase</h2>
      <p class="sub">Tu opinión nos ayuda a mejorar 🙏</p>
      <form id="form">
        <div class="pregunta">
          <label class="q">¿La clase fue dinámica?</label>
          <div class="estrellas" data-campo="dinamismo"></div>
        </div>
        <div class="pregunta">
          <label class="q">¿Te corrigió posturas?</label>
          <div class="estrellas" data-campo="correccionPosturas"></div>
        </div>
        <div class="pregunta">
          <label class="q">¿Sientes que has mejorado tu nivel?</label>
          <div class="estrellas" data-campo="mejoraNivel"></div>
        </div>
        <div class="pregunta">
          <label class="q">Trato y amabilidad</label>
          <div class="estrellas" data-campo="trato"></div>
        </div>
        <div class="pregunta">
          <label class="q">¿Volverías con el mismo profe?</label>
          <div class="opciones">
            <input type="radio" name="volveria" id="vol-si" value="si">
            <label for="vol-si">Sí 👍</label>
            <input type="radio" name="volveria" id="vol-no" value="no">
            <label for="vol-no">No 👎</label>
          </div>
        </div>
        <div class="pregunta">
          <label class="q" for="comentario">Comentario (opcional)</label>
          <textarea id="comentario" placeholder="Cuéntanos tu experiencia..."></textarea>
        </div>
        <button type="submit" id="btnEnviar">Enviar valoración</button>
        <div class="msg" id="msg"></div>
      </form>
    </section>

    <!-- Pantalla de agradecimiento -->
    <section class="form-card gracias" id="gracias" hidden>
      <div class="check">✅</div>
      <h2>¡Gracias por tu valoración!</h2>
      <p>Tu opinión se ha enviado correctamente.</p>
    </section>
  </div>

  <script>
    const WEBHOOK_URL = "https://n8n.guillers.es/webhook/grandvalira";
    const CAMPOS_ESTRELLAS = ["dinamismo", "correccionPosturas", "mejoraNivel", "trato"];

    const params = new URLSearchParams(location.search);
    const monitorId = params.get("id") || "demo";
    let monitor = null;

    // Genera los radios de estrellas (5..1 para que el CSS row-reverse funcione)
    document.querySelectorAll(".estrellas").forEach(cont => {
      const campo = cont.dataset.campo;
      for (let i = 5; i >= 1; i--) {
        const input = document.createElement("input");
        input.type = "radio"; input.name = campo; input.value = i; input.id = `${campo}-${i}`;
        const label = document.createElement("label");
        label.htmlFor = `${campo}-${i}`;
        label.setAttribute("aria-label", `${i} estrellas`);
        cont.appendChild(input); cont.appendChild(label);
      }
    });

    // Carga los datos del monitor
    async function cargarMonitor() {
      try {
        const res = await fetch("monitores.json", { cache: "no-store" });
        const data = await res.json();
        monitor = data[monitorId];
        if (!monitor) { mostrarAviso(); return; }
        pintarTarjeta(monitor);
        document.getElementById("tarjeta").hidden = false;
        document.getElementById("formCard").hidden = false;
      } catch (e) {
        mostrarAviso();
      }
    }

    function pintarTarjeta(m) {
      const foto = document.getElementById("foto");
      foto.src = m.foto; foto.alt = "Foto de " + m.nombre;
      document.getElementById("nombre").textContent = m.nombre;
      document.getElementById("titulo").textContent = m.titulo;
      const tel = document.getElementById("telefono");
      tel.textContent = m.telefono; tel.href = "tel:" + m.telefono.replace(/\s/g, "");
      const mail = document.getElementById("email");
      mail.textContent = m.email; mail.href = "mailto:" + m.email;
      document.getElementById("idiomas").textContent = m.idiomas;
      document.getElementById("experiencia").textContent = m.experiencia;

      // Redes sociales: muestra solo las que tengan enlace
      [["whatsapp", "soc-whatsapp"], ["tiktok", "soc-tiktok"], ["instagram", "soc-instagram"]]
        .forEach(([campo, id]) => {
          const el = document.getElementById(id);
          if (m[campo]) { el.href = m[campo]; el.hidden = false; }
          else { el.hidden = true; }
        });
    }

    function mostrarAviso() {
      const t = document.getElementById("tarjeta");
      t.hidden = false;
      t.innerHTML = '<div class="nombre">Monitor no encontrado</div>' +
        '<p class="titulo">No existe un monitor con id "' + monitorId + '".</p>';
    }

    // Envío del formulario
    const form = document.getElementById("form");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.className = "msg";

      const valores = {};
      for (const campo of CAMPOS_ESTRELLAS) {
        const sel = form.querySelector(`input[name="${campo}"]:checked`);
        if (!sel) { error("Por favor, valora todos los apartados con estrellas."); return; }
        valores[campo] = Number(sel.value);
      }
      const volveriaSel = form.querySelector('input[name="volveria"]:checked');
      if (!volveriaSel) { error("Indica si volverías con el mismo profe."); return; }

      const payload = {
        monitorId: monitorId,
        monitorNombre: monitor ? monitor.nombre : null,
        ...valores,
        volveria: volveriaSel.value === "si",
        comentario: document.getElementById("comentario").value.trim(),
        fecha: new Date().toISOString()
      };

      const btn = document.getElementById("btnEnviar");
      btn.disabled = true; btn.textContent = "Enviando...";
      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        document.getElementById("formCard").hidden = true;
        document.getElementById("gracias").hidden = false;
        document.getElementById("gracias").scrollIntoView({ behavior: "smooth" });
      } catch (err) {
        error("No se pudo enviar. Revisa tu conexión e inténtalo de nuevo.");
        btn.disabled = false; btn.textContent = "Enviar valoración";
      }

      function error(texto) { msg.textContent = texto; msg.className = "msg err"; }
    });

    cargarMonitor();
  </script>
</body>
</html>
